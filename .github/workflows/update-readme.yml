name: 🔄 Update Profile README

on:
  schedule:
    - cron: '0 0 * * *'   # runs every day at midnight UTC
  workflow_dispatch:        # allows manual trigger from GitHub UI
  push:
    branches: [main]

jobs:
  update-readme:
    name: Refresh GitHub Stats & Activity
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # ── 1. Update GitHub Stats Card (auto via vercel, no action needed) ──
      # The stats badges in your README auto-refresh on every page load.
      # This step just ensures README is committed if you modify it below.

      # ── 2. Update latest GitHub activity in README ──
      - name: Update GitHub Activity
        uses: jamesgeorge007/github-activity-readme@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          COMMIT_MSG: '🤖 update: latest GitHub activity'
          MAX_LINES: 5        # show last 5 activity items

      # ── 3. Update metrics snapshot (optional, needs metrics action) ──
      # Uncomment below if you want a full metrics image in your README
      # - name: Generate Metrics
      #   uses: lowlighter/metrics@latest
      #   with:
      #     token: ${{ secrets.METRICS_TOKEN }}
      #     user: zaidlh
      #     template: classic
      #     base: header, activity, community, repositories
      #     config_timezone: Asia/Riyadh

      # ── 4. Snake contribution graph ──
      - name: Generate Snake Animation
        uses: Platane/snk@v3
        with:
          github_user_name: zaidlh
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Push snake animation to output branch
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
